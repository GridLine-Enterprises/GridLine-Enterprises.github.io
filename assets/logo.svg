<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Gridline Digital logo</title>
  <desc id="logoDesc">A premium grid-inspired G monogram with the Gridline Digital wordmark.</desc>
  <defs>
    <linearGradient id="bgGlow" x1="32" y1="24" x2="188" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0a0f16"/>
    </linearGradient>
    <linearGradient id="markStroke" x1="42" y1="36" x2="170" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="0.58" stop-color="#7dd7ff"/>
      <stop offset="1" stop-color="#c6ff4d"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd7ff"/>
      <stop offset="1" stop-color="#c6ff4d"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="20" y="20" width="172" height="172" rx="42" fill="url(#bgGlow)"/>
    <path d="M62 66h92" stroke="url(#markStroke)" stroke-width="18" stroke-linecap="round"/>
    <path d="M62 66v80" stroke="url(#markStroke)" stroke-width="18" stroke-linecap="round"/>
    <path d="M62 146h92" stroke="url(#markStroke)" stroke-width="18" stroke-linecap="round"/>
    <path d="M114 108h40" stroke="url(#markStroke)" stroke-width="18" stroke-linecap="round"/>
    <path d="M154 108v38" stroke="url(#markStroke)" stroke-width="18" stroke-linecap="round"/>

    <g opacity="0.3" stroke="#233041" stroke-width="2">
      <path d="M40 77h132"/>
      <path d="M40 106h132"/>
      <path d="M40 135h132"/>
      <path d="M77 40v132"/>
      <path d="M106 40v132"/>
      <path d="M135 40v132"/>
    </g>

    <circle cx="157" cy="55" r="7" fill="#c6ff4d"/>
  </g>

  <g fill="#f4f6f8">
    <text x="236" y="104" font-family="Space Grotesk, Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="-2.8">Gridline</text>
    <text x="240" y="156" font-family="Manrope, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="url(#wordAccent)">DIGITAL</text>
    <text x="241" y="186" font-family="Manrope, Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="1.2" fill="#98a4b8">Premium websites for ambitious local brands</text>
  </g>
</svg>
