<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 320" width="1040" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&amp;family=Syne:wght@700;800&amp;display=swap');
    </style>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5C3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5C3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0077FF;stop-opacity:0.9" />
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="240" height="240" rx="36"/>
    </clipPath>
  </defs>

  <!-- Icon background tile -->
  <rect x="40" y="40" width="240" height="240" rx="36" fill="#111827"/>

  <!-- Grid lines inside icon -->
  <!-- Horizontal lines -->
  <line x1="40" y1="120" x2="280" y2="120" stroke="#1E2D45" stroke-width="2" clip-path="url(#iconClip)"/>
  <line x1="40" y1="160" x2="280" y2="160" stroke="#1E2D45" stroke-width="2" clip-path="url(#iconClip)"/>
  <line x1="40" y1="200" x2="280" y2="200" stroke="#1E2D45" stroke-width="2" clip-path="url(#iconClip)"/>
  <!-- Vertical lines -->
  <line x1="120" y1="40" x2="120" y2="280" stroke="#1E2D45" stroke-width="2" clip-path="url(#iconClip)"/>
  <line x1="160" y1="40" x2="160" y2="280" stroke="#1E2D45" stroke-width="2" clip-path="url(#iconClip)"/>
  <line x1="200" y1="40" x2="200" y2="280" stroke="#1E2D45" stroke-width="2" clip-path="url(#iconClip)"/>

  <!-- Gridline G shape — built from bold grid-aligned rectangles -->
  <!-- Top bar -->
  <rect x="84" y="84" width="112" height="20" rx="4" fill="url(#gridGrad)"/>
  <!-- Left bar -->
  <rect x="84" y="84" width="20" height="112" rx="4" fill="url(#gridGrad)"/>
  <!-- Bottom bar -->
  <rect x="84" y="176" width="112" height="20" rx="4" fill="url(#gridGrad)"/>
  <!-- Right middle notch (G cutout) -->
  <rect x="156" y="136" width="40" height="20" rx="4" fill="url(#gridGrad)"/>
  <!-- Right bar (bottom half only) -->
  <rect x="176" y="136" width="20" height="60" rx="4" fill="url(#gridGrad)"/>

  <!-- Dot accent — top right corner of icon -->
  <circle cx="260" cy="60" r="10" fill="#00E5C3" opacity="0.85"/>

  <!-- Wordmark: GRIDLINE -->
  <text
    x="316"
    y="176"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-weight="800"
    font-size="84"
    letter-spacing="-2"
    fill="#F0F4FF"
  >GRIDLINE</text>

  <!-- Wordmark: DIGITAL -->
  <text
    x="320"
    y="232"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="500"
    font-size="34"
    letter-spacing="16"
    fill="url(#accentGrad)"
  >DIGITAL</text>

  <!-- Thin accent line under GRIDLINE -->
  <rect x="316" y="188" width="680" height="3" rx="2" fill="#1E2D45"/>

</svg>